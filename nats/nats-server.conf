# Boardroom — NATS Server Config
# Runs on ASUS (Main), accepts connections from WATER + STEAM

# Listen on all interfaces so Tailscale/LAN clients can connect
listen: 0.0.0.0:4222

# Server name for logging
server_name: boardroom-nats

# ─── Authentication ──────────────────────────────────────────
# Token-based auth: all clients must provide this token to connect.
# Generate with: openssl rand -hex 32
# Set via env: NATS_AUTH_TOKEN (falls back to this default for dev)
authorization {
  token: $NATS_AUTH_TOKEN
}

# ─── TLS (optional, enable when certs are available) ─────────
# Uncomment when you have certs (e.g. from Tailscale or mkcert):
#
# tls {
#   cert_file: "/mnt/d/AI/boardroom/nats/certs/server-cert.pem"
#   key_file:  "/mnt/d/AI/boardroom/nats/certs/server-key.pem"
# }
#
# For now: Tailscale encrypts all traffic between nodes, so plaintext
# on the Tailscale interface is acceptable. Do NOT expose port 4222
# to the public internet without enabling TLS.

# JetStream — durable message storage for output streaming
jetstream {
  store_dir: "/mnt/d/AI/boardroom/nats/jetstream-data"
  max_mem: 256MB
  max_file: 1GB
}

# WebSocket — browser (dashboard) connects here
websocket {
  listen: 0.0.0.0:8443
  no_tls: true
  # Auth applies to WS connections too — clients must pass token
  # via: ws://host:8443?token=YOUR_TOKEN or Authorization header
}

# Logging
log_file: "/mnt/d/AI/boardroom/nats/nats.log"
logtime: true
debug: false
